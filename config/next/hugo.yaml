baseURL: https://next.blog.panghuli.cn
title: phenix3443's blog
copyright: "Copyright © 2016-{year} phenix3443. All Rights Reserved."
defaultContentLanguage: zh-hans
hasCJKLanguage: true
enableRobotsTXT: true
enableEmoji: true
enableGitInfo: true

module:
  imports:
    - path: github.com/hugo-next/hugo-theme-next

taxonomies:
  category: categories
  series: series
  tag: tags

build:
  writeStats: true

markup:
  tableOfContents:
    endLevel: 4
    ordered: false
    startLevel: 1

frontmatter:
  lastmod: [":git", "lastmod", ":fileModTime", ":default"]
