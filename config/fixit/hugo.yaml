baseURL: https://fixit.blog.panghuli.cn
title: phenix3443's blog
copyright: "Copyright © 2016-{year} phenix3443. All Rights Reserved."
defaultContentLanguage: zh-hans
hasCJKLanguage: true
enableRobotsTXT: true
enableEmoji: true
enableGitInfo: true
pygmentsUseClasses: true
disqusShortname: phenix3443

taxonomies:
  category: categories
  series: series
  tag: tags

build:
  writeStats: true

permalinks:
  news: /news/:year/:month/:title/
  blog: /blog/:year/:month/:title/

module:
  imports:
    - path: github.com/hugo-fixit/FixIt

markup:
  tableOfContents:
    endLevel: 4
    ordered: false
    startLevel: 1

frontmatter:
  lastmod: [":git", "lastmod", ":fileModTime", ":default"]
