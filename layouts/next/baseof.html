{{- /* Next theme layout override to inject theme switcher */ -}}
{{- define "head" }}
  {{- partial "head.html" . }}
  <script src="/js/theme-switcher.js"></script>
{{- end }}

{{- define "header" }}
  {{- partial "header.html" . }}
  <div style="position: fixed; top: 10px; right: 20px; z-index: 1000;">
    {{- partial "theme-switcher.html" . }}
  </div>
{{- end }}
