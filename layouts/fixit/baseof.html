{{- /* FixIt theme layout override to inject theme switcher */ -}}
{{- define "assets" }}
  {{- partial "plugin/script.html" . }}
  <script src="/js/theme-switcher.js"></script>
{{- end }}

{{- define "header" }}
  {{- partial "header.html" . }}
  <div style="position: fixed; top: 60px; right: 20px; z-index: 1000;">
    {{- partial "theme-switcher.html" . }}
  </div>
{{- end }}
